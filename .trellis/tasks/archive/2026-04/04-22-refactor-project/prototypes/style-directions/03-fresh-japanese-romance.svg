.body{font:600 14px 'Segoe UI','Noto Sans SC',Arial,sans-serif}
.tiny{font:800 12px 'Segoe UI','Noto Sans SC',Arial,sans-serif;letter-spacing:.4px}
.note{font:700 13px 'Segoe UI','Noto Sans SC',Arial,sans-serif}
</style>
</defs>
