<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="960" viewBox="0 0 1440 960">
  <defs>
    <radialGradient id="fire" cx="0.23" cy="0.15" r="0.85">
      <stop offset="0" stop-color="#8A3F18"/>
      <stop offset="0.52" stop-color="#28140A"/>
      <stop offset="1" stop-color="#120805"/>
    </radialGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5A2F16"/>
      <stop offset="0.55" stop-color="#3A2114"/>
      <stop offset="1" stop-color="#1E0F08"/>
    </linearGradient>
    <linearGradient id="parch" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F4DFAE"/>
      <stop offset="1" stop-color="#C8944E"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <pattern id="grain" width="120" height="80" patternUnits="userSpaceOnUse">
      <path d="M0 24 C30 4, 72 44, 120 18" fill="none" stroke="#8A5127" stroke-opacity="0.18"/>
      <path d="M0 60 C44 38, 74 82, 120 58" fill="none" stroke="#FFD36E" stroke-opacity="0.08"/>
      <circle cx="28" cy="42" r="7" fill="none" stroke="#FFD36E" stroke-opacity="0.08"/>
    </pattern>
    <style>
      .title { font: 900 34px 'Segoe UI', 'Noto Sans SC', Arial, sans-serif; fill: #FFF2D4; letter-spacing: .5px; }
      .sub { font: 600 16px 'Segoe UI', 'Noto Sans SC', Arial, sans-serif; fill: #C9A875; }
      .h1 { font: 900 24px 'Segoe UI', 'Noto Sans SC', Arial, sans-serif; fill: #FFF2D4; }
      .h2 { font: 800 18px 'Segoe UI', 'Noto Sans SC', Arial, sans-serif; fill: #FFF2D4; }
      .body { font: 600 14px 'Segoe UI', 'Noto Sans SC', Arial, sans-serif; fill: #E8C98B; }
      .tiny { font: 800 12px 'Segoe UI', 'Noto Sans SC', Arial, sans-serif; fill: #C9A875; letter-spacing: .3px; }
      .label { font: 900 11px 'Segoe UI', 'Noto Sans SC', Arial, sans-serif; fill: #34E6D2; letter-spacing: 1.8px; }
      .note { font: 700 13px 'Segoe UI', 'Noto Sans SC', Arial, sans-serif; fill: #FFD36E; }
      .dark { fill: #2A160B; }
</style>
  </defs>
  <rect width="1440" height="960" fill="url(#fire)"/>
  <rect width="1440" height="960" fill="url(#grain)" opacity="0.95"/>
  <circle cx="168" cy="132" r="220" fill="#FF7A24" opacity="0.16" filter="url(#softGlow)"/>
  <circle cx="1184" cy="128" r="240" fill="#34E6D2" opacity="0.08" filter="url(#softGlow)"/>
  <text x="64" y="62" class="title">酒馆入口 / Tavern Entry</text>
  <text x="64" y="90" class="sub">像走近一块发光木牌：先理解店主设定、NPC 与入场承诺</text>
  <text x="1140" y="60" class="label">FABLEMAP COZY CYBER TAVERN</text>
<rect x="64" y="118" width="1312" height="64" rx="30" fill="#24130B" stroke="#D69A35" stroke-width="1.4" opacity="0.94" filter="url(#shadow)"/>
<rect x="84" y="132" width="44" height="36" rx="14" fill="url(#parch)" stroke="#FFD36E" stroke-width="1.4" opacity="1" />
<text x="95" y="157" class="h2" fill="#2A160B">FM</text>
<text x="146" y="157" class="h2">FableMap</text>
<rect x="310" y="133" width="88" height="34" rx="17" fill="url(#parch)" stroke="#34E6D2" stroke-width="1.4" opacity="1" />
<text x="326" y="155" class="tiny" fill="#2A160B">发现</text>
<rect x="418" y="133" width="88" height="34" rx="17" fill="#D69A35" stroke="#D69A35" stroke-width="1.4" opacity="0.18" />
<text x="434" y="155" class="tiny" fill="#D69A35">开店</text>
<rect x="526" y="133" width="88" height="34" rx="17" fill="#D69A35" stroke="#D69A35" stroke-width="1.4" opacity="0.18" />
<text x="542" y="155" class="tiny" fill="#D69A35">我的酒馆</text>
<rect x="634" y="133" width="88" height="34" rx="17" fill="#D69A35" stroke="#D69A35" stroke-width="1.4" opacity="0.18" />
<text x="650" y="155" class="tiny" fill="#D69A35">设置</text>
<text x="1138" y="157" class="tiny">demo-owner · API Key 仅店主本地私有</text>
<rect x="64" y="214" width="512" height="650" rx="32" fill="#2A170E" stroke="#D69A35" stroke-width="1.4" opacity="1" filter="url(#shadow)"/>
<rect x="92" y="246" width="456" height="220" rx="28" fill="url(#parch)" stroke="#FFD36E" stroke-width="1.4" opacity="1" filter="url(#shadow)"/>
<text x="122" y="290" class="h1" fill="#2A160B">雨巷电台</text>
<text x="122" y="322" class="body" fill="#2A160B">真实街角上的赛博酒馆，雨声和旧电台永远在线。</text>
<rect x="122" y="350" width="170" height="34" rx="17" fill="#34E6D2" stroke="#34E6D2" stroke-width="1.4" opacity="0.18" />
<text x="138" y="372" class="tiny" fill="#34E6D2">坐标 31.2304,121.4737</text>
<rect x="312" y="350" width="170" height="34" rx="17" fill="#D69A35" stroke="#D69A35" stroke-width="1.4" opacity="0.18" />
<text x="328" y="372" class="tiny" fill="#D69A35">访问 public</text>
<rect x="122" y="396" width="170" height="34" rx="17" fill="#8BE082" stroke="#8BE082" stroke-width="1.4" opacity="0.18" />
<text x="138" y="418" class="tiny" fill="#8BE082">状态 open</text>
<rect x="312" y="396" width="170" height="34" rx="17" fill="#FFD36E" stroke="#FFD36E" stroke-width="1.4" opacity="0.18" />
<text x="328" y="418" class="tiny" fill="#FFD36E">回访 12 次</text>
<text x="96" y="512" class="h2">入场承诺</text>
<text x="112" y="548" class="body">• 店主承担 LLM token；访客不看到 API Key。</text>
<text x="112" y="584" class="body">• 对话会生成可回放历史与可见性受控记忆。</text>
<text x="112" y="620" class="body">• 角色卡保持 SillyTavern 兼容，可导出。</text>
<rect x="96" y="686" width="190" height="44" rx="22" fill="url(#parch)" stroke="#FFD36E" stroke-width="1.4" opacity="1" filter="url(#shadow)"/>
<text x="118" y="714" class="body" fill="#2A160B">推门进入</text>
<rect x="306" y="686" width="180" height="44" rx="22" fill="#3B2114" stroke="#D69A35" stroke-width="1.4" opacity="1" filter="url(#shadow)"/>
