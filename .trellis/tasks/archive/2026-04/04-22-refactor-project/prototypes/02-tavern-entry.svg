<rect x="608" y="214" width="768" height="312" rx="32" fill="#2A170E" stroke="#D69A35" stroke-width="1.4" opacity="1" filter="url(#shadow)"/>
<text x="642" y="258" class="h1">NPC 坐在桌边</text>
<rect x="642" y="296" width="210" height="184" rx="28" fill="#3A2114" stroke="#34E6D2" stroke-width="1.4" opacity="1" filter="url(#shadow)"/>
<circle cx="696" cy="352" r="34" fill="#34E6D2" opacity="0.24" filter="url(#softGlow)"/>
<text x="746" y="340" class="h2">露西</text>
<text x="746" y="366" class="tiny" fill="#34E6D2">电台主持</text>
<text x="666" y="430" class="body">“今天也有信号，坐下聊聊？”</text>
<rect x="878" y="296" width="210" height="184" rx="28" fill="#3A2114" stroke="#B78CFF" stroke-width="1.4" opacity="1" filter="url(#shadow)"/>
<circle cx="932" cy="352" r="34" fill="#B78CFF" opacity="0.24" filter="url(#softGlow)"/>
<text x="982" y="340" class="h2">灰鸦</text>
<text x="982" y="366" class="tiny" fill="#B78CFF">沉默调酒师</text>
<text x="902" y="430" class="body">“点单前，先说你的来意。”</text>
<rect x="1114" y="296" width="210" height="184" rx="28" fill="#3A2114" stroke="#FFD36E" stroke-width="1.4" opacity="1" filter="url(#shadow)"/>
<circle cx="1168" cy="352" r="34" fill="#FFD36E" opacity="0.24" filter="url(#softGlow)"/>
<text x="1218" y="340" class="h2">M-17</text>
<text x="1218" y="366" class="tiny" fill="#FFD36E">老式终端</text>
<text x="1138" y="430" class="body">“我记得你上次问过桥。”</text>
<rect x="608" y="558" width="768" height="306" rx="32" fill="#2A170E" stroke="#D69A35" stroke-width="1.4" opacity="1" filter="url(#shadow)"/>
<text x="642" y="602" class="h1">入场后的桌面信息架构</text>
<circle cx="666" cy="642" r="9" fill="#34E6D2"/>
<text x="688" y="646" class="h2">对话主线</text>
<text x="846" y="646" class="body">单 NPC / 群聊入口，历史按 visitor 隔离</text>
<circle cx="666" cy="706" r="9" fill="#B78CFF"/>
<text x="688" y="710" class="h2">记忆反馈</text>
<text x="846" y="710" class="body">可见记忆、回访关系、写回摘要</text>
<circle cx="666" cy="770" r="9" fill="#FFD36E"/>
<text x="688" y="774" class="h2">玩法轻互动</text>
<text x="846" y="774" class="body">店主定义文字节点，不做 RPG 战斗</text>
<text x="72" y="902" class="note">视觉约束：入口页像“酒馆门口”，不是传统地图 POI 详情，也不是卡牌桌。</text>
</svg>
