<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="960" viewBox="0 0 1440 960">
  <defs>
    <radialGradient id="bg" cx="0.18" cy="0.12" r="0.95">
      <stop offset="0" stop-color="#4A2511"/>
      <stop offset="0.48" stop-color="#111827"/>
      <stop offset="1" stop-color="#070814"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000" flood-opacity="0.42"/>
    </filter>
    <style>
      .title { font: 900 34px 'Segoe UI','Noto Sans SC',Arial,sans-serif; fill: #FFF2D4; letter-spacing: .5px; }
      .sub { font: 600 16px 'Segoe UI','Noto Sans SC',Arial,sans-serif; fill: #C9A875; }
      .h1 { font: 900 22px 'Segoe UI','Noto Sans SC',Arial,sans-serif; fill: #FFFFFF; }
      .h2 { font: 850 17px 'Segoe UI','Noto Sans SC',Arial,sans-serif; fill: #FFFFFF; }
      .body { font: 650 14px 'Segoe UI','Noto Sans SC',Arial,sans-serif; fill: #E8E1FF; }
      .tiny { font: 850 12px 'Segoe UI','Noto Sans SC',Arial,sans-serif; letter-spacing: .4px; }
      .label { font: 900 11px 'Segoe UI','Noto Sans SC',Arial,sans-serif; letter-spacing: 1.7px; }
    </style>
  </defs>

  <rect width="1440" height="960" fill="url(#bg)"/>
  <circle cx="180" cy="124" r="220" fill="#F8C76A" opacity="0.16" filter="url(#glow)"/>
  <circle cx="1210" cy="132" r="260" fill="#22D3EE" opacity="0.14" filter="url(#glow)"/>
  <circle cx="980" cy="810" r="240" fill="#A7F3D0" opacity="0.11" filter="url(#glow)"/>

  <text x="64" y="62" class="title">NPC 形象风格投放 / NPC Style Cast</text>
  <text x="64" y="92" class="sub">把不同风格的 NPC 形象放入酒馆内：只做表现层 skin，不生成角色、不改 Schema、不替店主创作内容。</text>
  <text x="1088" y="62" class="label" fill="#34E6D2">OWNER-AUTHORED CHARACTER FIRST</text>

  <rect x="64" y="126" width="1312" height="86" rx="32" fill="#120A08" stroke="#D69A35" stroke-width="1.4" opacity="0.95" filter="url(#shadow)"/>
  <text x="96" y="160" class="h2">设计原则</text>
  <text x="96" y="188" class="body">角色内容来自店主角色卡；头像/精灵图优先显示。没有资源时，前端按标签或 appearance preset 渲染风格化占位，让酒馆内部先有“人”的存在感。</text>
  <text x="978" y="188" class="tiny" fill="#F8C76A">不复刻具体 IP / 不模仿在世艺术家笔触</text>

  <rect x="64" y="244" width="300" height="514" rx="30" fill="#3A2114" stroke="#F8C76A" stroke-width="1.6" filter="url(#shadow)"/>
  <circle cx="214" cy="330" r="88" fill="#F8C76A" opacity="0.18" filter="url(#glow)"/>
  <rect x="98" y="286" width="232" height="168" rx="32" fill="#201108" stroke="#F8C76A" stroke-opacity="0.55"/>
  <path d="M118 416 C162 388, 232 388, 310 418" fill="none" stroke="#34E6D2" stroke-opacity="0.42" stroke-width="3"/>
  <circle cx="214" cy="342" r="46" fill="#F8C76A"/>
  <rect x="168" y="388" width="92" height="112" rx="38" fill="#7C3F1D" stroke="#34E6D2" stroke-opacity="0.55"/>
  <path d="M178 430 L250 430" stroke="#2A160B" stroke-width="8" stroke-linecap="round"/>
  <circle cx="214" cy="414" r="12" fill="#34E6D2" opacity="0.85"/>
  <text x="96" y="530" class="h1">暖木质赛博酒馆</text>
  <text x="96" y="560" class="body">铜边围裙、烛火终端、羊皮纸菜单。</text>
  <rect x="96" y="584" width="164" height="34" rx="17" fill="#F8C76A" opacity="0.18" stroke="#F8C76A"/>
  <text x="114" y="606" class="tiny" fill="#F8C76A">向导 / 店员 / 档案员</text>
  <text x="96" y="654" class="body">适合默认主题、新手服务站、社区修补铺。</text>
  <text x="96" y="710" class="tiny" fill="#34E6D2">在酒馆里像可信赖的吧台值守者</text>

  <rect x="396" y="244" width="300" height="514" rx="30" fill="#061827" stroke="#22D3EE" stroke-width="1.6" filter="url(#shadow)"/>
  <circle cx="546" cy="330" r="88" fill="#22D3EE" opacity="0.18" filter="url(#glow)"/>
  <rect x="430" y="286" width="232" height="168" rx="32" fill="#050B18" stroke="#22D3EE" stroke-opacity="0.65"/>
  <path d="M450 424 L642 382" stroke="#C084FC" stroke-width="4" stroke-opacity="0.6"/>
  <circle cx="546" cy="342" r="46" fill="#0E7490"/>
  <rect x="500" y="388" width="92" height="112" rx="30" fill="#111827" stroke="#C084FC" stroke-opacity="0.7"/>
  <rect x="514" y="334" width="64" height="12" rx="6" fill="#22D3EE" filter="url(#glow)"/>
  <path d="M512 430 L580 430" stroke="#22D3EE" stroke-width="8" stroke-linecap="round"/>
  <text x="428" y="530" class="h1">霓虹夜城赛博朋克</text>
  <text x="428" y="560" class="body">雨衣机能服、霓虹目镜、湿地面反光。</text>
  <rect x="428" y="584" width="160" height="34" rx="17" fill="#22D3EE" opacity="0.18" stroke="#22D3EE"/>
  <text x="446" y="606" class="tiny" fill="#22D3EE">夜班 / 电台 / 机修</text>
  <text x="428" y="654" class="body">适合深夜电台、站台、雨巷和硬核都市。</text>
  <text x="428" y="710" class="tiny" fill="#C084FC">在酒馆里像雨夜招牌下的值守员</text>

  <rect x="728" y="244" width="300" height="514" rx="30" fill="#2B1952" stroke="#F9A8D4" stroke-width="1.6" filter="url(#shadow)"/>
  <circle cx="878" cy="330" r="88" fill="#F9A8D4" opacity="0.18" filter="url(#glow)"/>
  <rect x="762" y="286" width="232" height="168" rx="32" fill="#1F1638" stroke="#F9A8D4" stroke-opacity="0.58"/>
  <path d="M782 414 C826 384, 896 438, 974 402" fill="none" stroke="#86EFAC" stroke-opacity="0.52" stroke-width="4"/>
  <circle cx="878" cy="342" r="46" fill="#F9A8D4"/>
  <rect x="832" y="388" width="92" height="112" rx="36" fill="#93C5FD" stroke="#86EFAC" stroke-opacity="0.68"/>
  <path d="M846 432 L910 432" stroke="#FCE7F3" stroke-width="8" stroke-linecap="round"/>
  <circle cx="906" cy="398" r="10" fill="#86EFAC"/>
  <text x="760" y="530" class="h1">小清新日式漫画</text>
  <text x="760" y="560" class="body">浅色针织、便签胸针、柔光玻璃。</text>
  <rect x="760" y="584" width="178" height="34" rx="17" fill="#F9A8D4" opacity="0.18" stroke="#F9A8D4"/>
  <text x="778" y="606" class="tiny" fill="#F9A8D4">校园 / 治愈 / 咖啡角</text>
  <text x="760" y="654" class="body">适合校园附近、治愈陪伴、轻松问候。</text>
  <text x="760" y="710" class="tiny" fill="#86EFAC">在酒馆里像贴满便签的小窗边朋友</text>

  <rect x="1060" y="244" width="316" height="514" rx="30" fill="#0E3B36" stroke="#A7F3D0" stroke-width="1.6" filter="url(#shadow)"/>
  <circle cx="1218" cy="330" r="88" fill="#A7F3D0" opacity="0.18" filter="url(#glow)"/>
  <rect x="1094" y="286" width="248" height="168" rx="32" fill="#082F2A" stroke="#A7F3D0" stroke-opacity="0.58"/>
  <path d="M1114 424 C1166 368, 1252 438, 1322 390" fill="none" stroke="#FBBF24" stroke-opacity="0.52" stroke-width="4"/>
  <circle cx="1218" cy="342" r="46" fill="#A7F3D0"/>
  <rect x="1172" y="388" width="92" height="112" rx="34" fill="#166534" stroke="#FBBF24" stroke-opacity="0.68"/>
  <path d="M1186 432 L1250 432" stroke="#0F766E" stroke-width="8" stroke-linecap="round"/>
  <circle cx="1188" cy="396" r="10" fill="#FBBF24"/>
  <text x="1092" y="530" class="h1">手绘幻想小镇</text>
  <text x="1092" y="560" class="body">旅人披肩、叶灯挂饰、水彩木梁。</text>
  <rect x="1092" y="584" width="178" height="34" rx="17" fill="#A7F3D0" opacity="0.18" stroke="#A7F3D0"/>
  <text x="1110" y="606" class="tiny" fill="#A7F3D0">渡口 / 占卜 / 奇谈</text>
  <text x="1092" y="654" class="body">适合童话小镇、奇谈秘闻、温柔冒险。</text>
  <text x="1092" y="710" class="tiny" fill="#FBBF24">在酒馆里像叶灯旁的回访向导</text>

  <rect x="64" y="802" width="1312" height="86" rx="32" fill="#0A0B16" stroke="#34E6D2" stroke-width="1.4" opacity="0.96" filter="url(#shadow)"/>
  <text x="96" y="838" class="h2">落地到 tavern route</text>
  <text x="96" y="868" class="body">owner-authored 角色卡 → 头像/精灵图优先 → 标签/appearance preset 解析为 style skin → NPC 放入酒馆室内舞台 → 点击 NPC 切换对话对象。</text>
  <text x="1118" y="868" class="tiny" fill="#34E6D2">API / Schema / 权限边界不变</text>
</svg>
