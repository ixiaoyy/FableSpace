<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="960" viewBox="0 0 1440 960">
  <defs>
    <radialGradient id="fire" cx="0.23" cy="0.15" r="0.85">
      <stop offset="0" stop-color="#8A3F18"/>
      <stop offset="0.52" stop-color="#28140A"/>
      <stop offset="1" stop-color="#120805"/>
    </radialGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5A2F16"/>
      <stop offset="0.55" stop-color="#3A2114"/>
      <stop offset="1" stop-color="#1E0F08"/>
    </linearGradient>
    <linearGradient id="parch" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F4DFAE"/>
      <stop offset="1" stop-color="#C8944E"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <pattern id="grain" width="120" height="80" patternUnits="userSpaceOnUse">
      <path d="M0 24 C30 4, 72 44, 120 18" fill="none" stroke="#8A5127" stroke-opacity="0.18"/>
      <path d="M0 60 C44 38, 74 82, 120 58" fill="none" stroke="#FFD36E" stroke-opacity="0.08"/>
      <circle cx="28" cy="42" r="7" fill="none" stroke="#FFD36E" stroke-opacity="0.08"/>
    </pattern>
    <style>
      .title { font: 900 34px 'Segoe UI', 'Noto Sans SC', Arial, sans-serif; fill: #FFF2D4; letter-spacing: .5px; }
      .sub { font: 600 16px 'Segoe UI', 'Noto Sans SC', Arial, sans-serif; fill: #C9A875; }
      .h1 { font: 900 24px 'Segoe UI', 'Noto Sans SC', Arial, sans-serif; fill: #FFF2D4; }
      .h2 { font: 800 18px 'Segoe UI', 'Noto Sans SC', Arial, sans-serif; fill: #FFF2D4; }
      .body { font: 600 14px 'Segoe UI', 'Noto Sans SC', Arial, sans-serif; fill: #E8C98B; }
      .tiny { font: 800 12px 'Segoe UI', 'Noto Sans SC', Arial, sans-serif; fill: #C9A875; letter-spacing: .3px; }
      .label { font: 900 11px 'Segoe UI', 'Noto Sans SC', Arial, sans-serif; fill: #34E6D2; letter-spacing: 1.8px; }
      .note { font: 700 13px 'Segoe UI', 'Noto Sans SC', Arial, sans-serif; fill: #FFD36E; }
      .dark { fill: #2A160B; }
</style>
  </defs>
  <rect width="1440" height="960" fill="url(#fire)"/>
  <rect width="1440" height="960" fill="url(#grain)" opacity="0.95"/>
  <circle cx="168" cy="132" r="220" fill="#FF7A24" opacity="0.16" filter="url(#softGlow)"/>
