<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>记忆翻牌 — 小游戏工坊</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 16px;
    }

    .header {
      text-align: center;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 900;
      color: #c084fc;
      margin-bottom: 4px;
    }

    .stats {
      display: flex;
      gap: 16px;
      font-size: 0.85rem;
      color: #94a3b8;
    }

    .stats span { color: #c084fc; font-weight: 700; }

    .board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      max-width: 400px;
      width: 100%;
      perspective: 600px;
    }

    .card {
      aspect-ratio: 1;
      cursor: pointer;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.4s;
    }

    .card.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      font-weight: 900;
      border: 2px solid transparent;
    }

    .card-back {
      background: linear-gradient(135deg, #4c1d95, #6d28d9);
      border-color: #7c3aed;
    }

    .card-front {
      background: linear-gradient(135deg, #1e1b4b, #312e81);
      border-color: #6366f1;
      transform: rotateY(180deg);
    }

    .card.matched .card-front {
      background: linear-gradient(135deg, #064e3b, #047857);
      border-color: #10b981;
    }

    .card.matched { opacity: 0.7; cursor: default; }

    .controls {
      margin-top: 16px;
      display: flex;
      gap: 10px;
    }

    button {
      padding: 10px 20px;
      font-size: 0.9rem;
      font-weight: 700;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: transform 0.1s;
    }

    button:active { transform: scale(0.97); }

    .btn-reset {
      background: #334155;
      color: #94a3b8;
    }

    .btn-reset:hover { background: #475569; }

    .message {
      margin-top: 12px;
      padding: 10px 20px;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 700;
      text-align: center;
      background: #1e293b;
      border: 1px solid #334155;
      color: #86efac;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🧠 记忆翻牌</h1>
    <div class="stats">
      <span>已配对：<b id="matched">0</b> / 8</span>
      <span>步数：<b id="moves">0</b></span>
    </div>
  </div>

  <div class="board" id="board"></div>

  <div class="controls">
    <button class="btn-reset" onclick="initGame()">重新开始</button>
  </div>

  <div class="message" id="message" style="display:none"></div>

  <script>
    // 8 pairs of emoji symbols — self-designed, no license needed
    const SYMBOLS = ['🍎', '🌙', '⭐', '🎵', '🔑', '🌸', '⚡', '🎈'];

    let cards = [];
    let flippedCards = [];
    let matchedCount = 0;
    let moves = 0;
    let locked = false;

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function createCard(symbol, index) {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.index = index;
      card.dataset.symbol = symbol;
      card.innerHTML = `
        <div class="card-face card-back">?</div>
        <div class="card-face card-front">${symbol}</div>
      `;
      card.addEventListener('click', () => flipCard(card));
      return card;
    }

    function flipCard(card) {
      if (locked) return;
      if (card.classList.contains('flipped')) return;
      if (card.classList.contains('matched')) return;

      card.classList.add('flipped');
      flippedCards.push(card);

      if (flippedCards.length === 2) {
        moves++;
        document.getElementById('moves').textContent = moves;
        locked = true;
        checkMatch();
      }
    }

    function checkMatch() {
      const [a, b] = flippedCards;
      if (a.dataset.symbol === b.dataset.symbol) {
        // Match!
        a.classList.add('matched');
        b.classList.add('matched');
        matchedCount++;
        document.getElementById('matched').textContent = matchedCount;
        flippedCards = [];
        locked = false;

        if (matchedCount === 8) {
          const msg = document.getElementById('message');
          msg.style.display = 'block';
          msg.textContent = '🎉 全部配对完成！用了 ' + moves + ' 步！';
        }
      } else {
        // No match — flip back
        setTimeout(() => {
          a.classList.remove('flipped');
          b.classList.remove('flipped');
          flippedCards = [];
          locked = false;
        }, 800);
      }
    }

    function initGame() {
      const board = document.getElementById('board');
      board.innerHTML = '';
      matchedCount = 0;
      moves = 0;
      flippedCards = [];
      locked = false;
      document.getElementById('matched').textContent = '0';
      document.getElementById('moves').textContent = '0';
      document.getElementById('message').style.display = 'none';

      // Create pairs and shuffle
      const pairs = shuffle([...SYMBOLS, ...SYMBOLS]);
      pairs.forEach((symbol, i) => {
        board.appendChild(createCard(symbol, i));
      });
    }

    initGame();
  </script>
</body>
</html>
