<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>猜数字 — 小游戏工坊</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 480px;
      padding: 24px;
      text-align: center;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 900;
      color: #67e8f9;
      margin-bottom: 8px;
      letter-spacing: 0.05em;
    }

    .subtitle {
      color: #94a3b8;
      font-size: 0.9rem;
      margin-bottom: 24px;
    }

    .hint-box {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      min-height: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .hint-icon {
      font-size: 2.5rem;
      margin-bottom: 8px;
    }

    .hint-text {
      font-size: 1.1rem;
      font-weight: 700;
      color: #67e8f9;
    }

    .hint-sub {
      font-size: 0.8rem;
      color: #64748b;
      margin-top: 4px;
    }

    .attempts {
      color: #f472b6;
      font-size: 0.85rem;
      font-weight: 700;
      margin-top: 12px;
    }

    .guess-input {
      width: 100%;
      padding: 14px;
      font-size: 1.4rem;
      font-weight: 900;
      text-align: center;
      background: #1e293b;
      border: 2px solid #334155;
      border-radius: 14px;
      color: #e2e8f0;
      outline: none;
      transition: border-color 0.2s;
    }

    .guess-input:focus {
      border-color: #67e8f9;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    button {
      flex: 1;
      padding: 12px;
      font-size: 1rem;
      font-weight: 800;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }

    button:active { transform: scale(0.97); }

    .btn-guess {
      background: #06b6d4;
      color: #0f172a;
    }

    .btn-guess:hover { background: #22d3ee; }

    .btn-reset {
      background: #334155;
      color: #94a3b8;
    }

    .btn-reset:hover { background: #475569; }

    .history {
      margin-top: 20px;
      text-align: left;
    }

    .history-title {
      font-size: 0.75rem;
      font-weight: 800;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    .history-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .history-item {
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
    }

    .history-item.high { background: #7f1d1d; color: #fca5a5; }
    .history-item.low { background: #1e3a5f; color: #93c5fd; }
    .history-item.win { background: #14532d; color: #86efac; }

    .game-over {
      background: linear-gradient(135deg, #1e293b, #0f172a);
      border: 2px solid #67e8f9;
      border-radius: 20px;
      padding: 32px;
      animation: pop 0.3s ease;
    }

    @keyframes pop {
      0% { transform: scale(0.9); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .game-over h2 {
      color: #67e8f9;
      font-size: 1.5rem;
      margin-bottom: 8px;
    }

    .game-over p { color: #94a3b8; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="container" id="app">
    <h1>🎯 猜数字</h1>
    <p class="subtitle">我来想了一个 1-100 之间的数字，猜猜看？</p>

    <div class="hint-box" id="hintBox">
      <div class="hint-icon" id="hintIcon">❓</div>
      <div class="hint-text" id="hintText">开始猜吧！</div>
      <div class="hint-sub" id="hintSub">我选了一个数字</div>
      <div class="attempts" id="attempts">剩余次数：7</div>
    </div>

    <div id="gameInput">
      <input
        type="number"
        class="guess-input"
        id="guessInput"
        min="1"
        max="100"
        placeholder="输入 1-100"
        autofocus
      >
      <div class="btn-row">
        <button class="btn-guess" id="guessBtn" onclick="submitGuess()">猜！</button>
        <button class="btn-reset" onclick="resetGame()">重新开始</button>
      </div>
    </div>

    <div id="gameOver" style="display:none">
      <div class="game-over">
        <h2 id="gameOverTitle">🎉 猜对了！</h2>
        <p id="gameOverText"></p>
        <div class="btn-row" style="margin-top:16px">
          <button class="btn-guess" onclick="resetGame()">再玩一次</button>
        </div>
      </div>
    </div>

    <div class="history" id="historySection" style="display:none">
      <div class="history-title">历史记录</div>
      <div class="history-list" id="historyList"></div>
    </div>
  </div>

  <script>
    const MAX_ATTEMPTS = 7;
    let secret = 0;
    let attempts = 0;
    let gameOver = false;
    let guessedNumbers = [];

    function init() {
      secret = Math.floor(Math.random() * 100) + 1;
      attempts = 0;
      gameOver = false;
      guessedNumbers = [];
      updateHint('', '我选了一个数字', '❓', MAX_ATTEMPTS);
      document.getElementById('guessInput').value = '';
      document.getElementById('gameInput').style.display = 'block';
      document.getElementById('gameOver').style.display = 'none';
      document.getElementById('historySection').style.display = 'none';
      document.getElementById('guessInput').focus();
    }

    function updateHint(text, sub, icon, remaining) {
      document.getElementById('hintText').textContent = text;
      document.getElementById('hintSub').textContent = sub;
      document.getElementById('hintIcon').textContent = icon;
      document.getElementById('attempts').textContent = '剩余次数：' + remaining;
    }

    function addHistory(guess, cls) {
      document.getElementById('historySection').style.display = 'block';
      const el = document.createElement('span');
      el.className = 'history-item ' + cls;
      el.textContent = guess;
      document.getElementById('historyList').appendChild(el);
    }

    function submitGuess() {
      if (gameOver) return;
      const input = document.getElementById('guessInput');
      const guess = parseInt(input.value, 10);
      if (isNaN(guess) || guess < 1 || guess > 100) {
        updateHint('请输入 1-100 的数字', '无效输入', '⚠️', MAX_ATTEMPTS - attempts);
        return;
      }
      attempts++;
      const remaining = MAX_ATTEMPTS - attempts;

      if (guess === secret) {
        gameOver = true;
        updateHint('🎉 ' + guess + '！正确！', attempts + ' 次猜中', '🎉', 0);
        addHistory(guess, 'win');
        document.getElementById('gameInput').style.display = 'none';
        const go = document.getElementById('gameOver');
        go.style.display = 'block';
        document.getElementById('gameOverTitle').textContent = '🎉 猜对了！';
        document.getElementById('gameOverText').textContent =
          '你用了 ' + attempts + ' 次猜中了数字 ' + secret + '。';
        return;
      }

      if (remaining <= 0) {
        gameOver = true;
        updateHint('😢 正确答案是 ' + secret, '7 次机会用完了', '💔', 0);
        addHistory(guess, 'high');
        document.getElementById('gameInput').style.display = 'none';
        const go = document.getElementById('gameOver');
        go.style.display = 'block';
        document.getElementById('gameOverTitle').textContent = '💔 游戏结束';
        document.getElementById('gameOverText').textContent =
          '正确答案是 ' + secret + '。再试一次吧！';
        return;
      }

      if (guess > secret) {
        updateHint('太大了 ↓', '还有 ' + remaining + ' 次机会', '⬇️', remaining);
        addHistory(guess, 'high');
      } else {
        updateHint('太小了 ↑', '还有 ' + remaining + ' 次机会', '⬆️', remaining);
        addHistory(guess, 'low');
      }
      input.value = '';
      input.focus();
    }

    function resetGame() {
      document.getElementById('historyList').innerHTML = '';
      init();
    }

    document.getElementById('guessInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') submitGuess();
    });

    init();
  </script>
</body>
</html>
