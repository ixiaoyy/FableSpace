<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵山静修 - 打坐</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --primary-color: #fbbf24;
            --text-color: #f8fafc;
            --accent-color: #22d3ee;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            letter-spacing: 0.1em;
            color: var(--primary-color);
        }

        .meditation-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 4px solid rgba(251, 191, 36, 0.2);
            margin: 2rem auto;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: transform 4s ease-in-out;
        }

        .inner-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--primary-color) 0%, transparent 70%);
            opacity: 0.6;
            animation: breathe 8s infinite ease-in-out;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(0.8); opacity: 0.4; }
            50% { transform: scale(1.8); opacity: 0.8; }
        }

        .stats {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .timer {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 1rem 0;
            font-variant-numeric: tabular-nums;
        }

        button {
            background: transparent;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 0.75rem 2rem;
            border-radius: 9999px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
        }

        button:hover {
            background: rgba(251, 191, 36, 0.1);
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .instruction {
            font-size: 0.9rem;
            margin-top: 1rem;
            min-height: 1.5rem;
            color: var(--accent-color);
        }

        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.3;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="container">
        <h1>灵山静修</h1>
        <div class="instruction" id="instruction">准备好后，点击下方开始静修</div>
        
        <div class="meditation-circle">
            <div class="inner-circle" id="circle"></div>
        </div>

        <div class="timer" id="timer">00:00</div>
        
        <div class="stats" id="stats">
            累计修行时间: <span id="totalTime">0</span>s
        </div>

        <button id="startBtn">开始静修</button>
    </div>

    <script>
        let isMeditating = false;
        let seconds = 0;
        let totalSeconds = 0;
        let timerInterval = null;

        const startBtn = document.getElementById('startBtn');
        const timerDisplay = document.getElementById('timer');
        const totalTimeDisplay = document.getElementById('totalTime');
        const instructionDisplay = document.getElementById('instruction');
        const circle = document.getElementById('circle');

        function updateTimer() {
            seconds++;
            totalSeconds++;
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            timerDisplay.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            totalTimeDisplay.textContent = totalSeconds;

            if (seconds % 8 === 0) {
                instructionDisplay.textContent = "吸气...";
            } else if (seconds % 8 === 4) {
                instructionDisplay.textContent = "呼气...";
            }
        }

        startBtn.addEventListener('click', () => {
            if (!isMeditating) {
                isMeditating = true;
                startBtn.textContent = "结束静修";
                instructionDisplay.textContent = "静下心来，跟随光芒呼吸...";
                timerInterval = setInterval(updateTimer, 1000);
                circle.style.animationPlayState = 'running';
            } else {
                isMeditating = false;
                startBtn.textContent = "重新开始";
                instructionDisplay.textContent = "修行结束，感悟已存。";
                clearInterval(timerInterval);
                seconds = 0;
                circle.style.animationPlayState = 'paused';
                
                // 向父窗口发送结果（可选）
                window.parent.postMessage({
                    type: 'GAME_RESULT',
                    gameId: 'game-meditation',
                    score: totalSeconds,
                    duration: seconds
                }, '*');
            }
        });

        // Initialize stars
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 50; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = `${Math.random() * 100}%`;
            star.style.top = `${Math.random() * 100}%`;
            const size = Math.random() * 3;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.setProperty('--duration', `${2 + Math.random() * 3}s`);
            starsContainer.appendChild(star);
        }

        circle.style.animationPlayState = 'paused';
    </script>
</body>
</html>
