services:
  backend:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: fablespace-backend:local
    env_file:
      - path: ./apps/api/.env
        required: false
    environment:
      FABLESPACE_OUTPUT_ROOT: /data
      PYTHONPATH: /app/apps/api/src
    ports:
      - "${FABLESPACE_API_BIND:-8000}:8000"
    volumes:
      - fablespace_data:/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-}
        VITE_AMAP_KEY: ${VITE_AMAP_KEY:-}
        VITE_AMAP_SECURITY_CODE: ${VITE_AMAP_SECURITY_CODE:-}
        VITE_ASSET_BASE_URL: ${VITE_ASSET_BASE_URL:-}
    image: fablespace-frontend:local
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FABLESPACE_WEB_BIND:-3000}:80"

volumes:
  fablespace_data:
