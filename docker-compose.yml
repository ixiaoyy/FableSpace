services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: fablespace-backend:local
    environment:
      FABLESPACE_STORAGE_BACKEND: ${FABLESPACE_STORAGE_BACKEND:-${FABLEMAP_STORAGE_BACKEND:-database}}
      FABLESPACE_DATABASE_URL: ${FABLESPACE_DATABASE_URL:-${FABLEMAP_DATABASE_URL:-}}
      FABLESPACE_MYSQL_URL: ${FABLESPACE_MYSQL_URL:-${FABLEMAP_MYSQL_URL:-}}
      FABLESPACE_OUTPUT_ROOT: /data
      FABLESPACE_SEED_DEFAULT_SPACES: ${FABLESPACE_SEED_DEFAULT_SPACES:-${FABLEMAP_SEED_DEFAULT_TAVERNS:-1}}
      FABLESPACE_CORS_ORIGINS: ${FABLESPACE_CORS_ORIGINS:-${FABLEMAP_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}}
      OPENCODE_API_KEY: ${OPENCODE_API_KEY:-}
      PYTHONPATH: /app/backend/src
    ports:
      - "${FABLESPACE_API_PORT:-${FABLEMAP_API_PORT:-8000}}:8000"
    volumes:
      - fablespace_data:/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-}
        VITE_AMAP_KEY: ${VITE_AMAP_KEY:-}
        VITE_AMAP_SECURITY_CODE: ${VITE_AMAP_SECURITY_CODE:-}
    image: fablespace-frontend:local
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FABLESPACE_FRONTEND_PORT:-${FABLEMAP_FRONTEND_PORT:-3000}}:80"

volumes:
  fablespace_data:
