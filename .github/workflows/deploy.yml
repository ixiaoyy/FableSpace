name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "deploy/**"
      - "docker-compose.yml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: fablespace-production
  cancel-in-progress: true

permissions:
  contents: read

env:
  FRONTEND_IMAGE: fablespace-frontend:local

jobs:
  changes:
    name: Detect deploy scope
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infrastructure: ${{ steps.filter.outputs.infrastructure }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'apps/api/**'
            frontend:
              - 'apps/web/**'
            infrastructure:
              - 'deploy/**'
              - 'docker-compose.yml'
              - '.github/workflows/deploy.yml'

  build-frontend:
    name: Build frontend and publish CDN assets
    runs-on: ubuntu-latest
    needs: changes
    if: |
      vars.DEPLOY_ENABLED == 'true' &&
      (github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.infrastructure == 'true')
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Validate CDN configuration
        id: cdn
        env:
          CDN_BASE_URL: ${{ secrets.CDN_BASE_URL }}
          CDN_S3_BUCKET: ${{ secrets.CDN_S3_BUCKET }}
          CDN_S3_ENDPOINT_URL: ${{ secrets.CDN_S3_ENDPOINT_URL }}
          CDN_S3_ACCESS_KEY_ID: ${{ secrets.CDN_S3_ACCESS_KEY_ID }}
          CDN_S3_SECRET_ACCESS_KEY: ${{ secrets.CDN_S3_SECRET_ACCESS_KEY }}
          CDN_S3_PREFIX: ${{ vars.CDN_S3_PREFIX || 'fablespace' }}
          PUBLIC_SITE_ORIGIN: ${{ secrets.PUBLIC_SITE_ORIGIN }}
        run: |
          set -euo pipefail
          for name in CDN_BASE_URL CDN_S3_BUCKET CDN_S3_ENDPOINT_URL CDN_S3_ACCESS_KEY_ID CDN_S3_SECRET_ACCESS_KEY PUBLIC_SITE_ORIGIN; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required GitHub Actions secret: ${name}"
              exit 1
            fi
          done
          case "${CDN_BASE_URL}" in
            https://*) ;;
            *) echo "::error::CDN_BASE_URL must use HTTPS"; exit 1 ;;
          esac
          case "${CDN_S3_ENDPOINT_URL}" in
            https://*) ;;
            *) echo "::error::CDN_S3_ENDPOINT_URL must use HTTPS"; exit 1 ;;
          esac
          case "${PUBLIC_SITE_ORIGIN}" in
            https://*) ;;
            *) echo "::error::PUBLIC_SITE_ORIGIN must use HTTPS"; exit 1 ;;
          esac
          CDN_S3_PREFIX="${CDN_S3_PREFIX#/}"
          CDN_S3_PREFIX="${CDN_S3_PREFIX%/}"
          if [ -z "${CDN_S3_PREFIX}" ] || [[ "${CDN_S3_PREFIX}" == *".."* ]]; then
            echo "::error::CDN_S3_PREFIX must be a non-empty object-key directory"
            exit 1
          fi
          ASSET_BASE_URL="${CDN_BASE_URL%/}/${CDN_S3_PREFIX}/releases/${GITHUB_SHA}"
          echo "asset_base_url=${ASSET_BASE_URL}" >> "${GITHUB_OUTPUT}"
          echo "s3_prefix=${CDN_S3_PREFIX}" >> "${GITHUB_OUTPUT}"

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          build-args: |
            VITE_API_BASE=${{ secrets.VITE_API_BASE }}
            VITE_AMAP_KEY=${{ secrets.VITE_AMAP_KEY }}
            VITE_AMAP_SECURITY_CODE=${{ secrets.VITE_AMAP_SECURITY_CODE }}
            VITE_ASSET_BASE_URL=${{ steps.cdn.outputs.asset_base_url }}
          tags: ${{ env.FRONTEND_IMAGE }}
          load: true
          cache-from: type=gha,scope=fablespace-web
          cache-to: type=gha,mode=max,scope=fablespace-web

      - name: Extract release assets
        run: |
          set -euo pipefail
          mkdir -p /tmp/fablespace-assets
          CONTAINER_ID="$(docker create "${FRONTEND_IMAGE}")"
          trap 'docker rm -f "${CONTAINER_ID}" >/dev/null 2>&1 || true' EXIT
          docker cp "${CONTAINER_ID}:/usr/share/nginx/html/assets/." /tmp/fablespace-assets/
          test -n "$(find /tmp/fablespace-assets -type f -print -quit)"

      - name: Publish immutable assets to S3-compatible storage
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CDN_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CDN_S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.CDN_S3_REGION || 'auto' }}
          AWS_EC2_METADATA_DISABLED: "true"
          CDN_S3_BUCKET: ${{ secrets.CDN_S3_BUCKET }}
          CDN_S3_ENDPOINT_URL: ${{ secrets.CDN_S3_ENDPOINT_URL }}
          CDN_S3_PREFIX: ${{ steps.cdn.outputs.s3_prefix }}
        run: |
          set -euo pipefail
          aws s3 sync \
            /tmp/fablespace-assets/ \
            "s3://${CDN_S3_BUCKET}/${CDN_S3_PREFIX}/releases/${GITHUB_SHA}/assets/" \
            --endpoint-url "${CDN_S3_ENDPOINT_URL}" \
            --delete \
            --cache-control "public,max-age=31536000,immutable"

      - name: Verify CDN delivery
        env:
          ASSET_BASE_URL: ${{ steps.cdn.outputs.asset_base_url }}
          PUBLIC_SITE_ORIGIN: ${{ secrets.PUBLIC_SITE_ORIGIN }}
        run: |
          set -euo pipefail
          SAMPLE_FILE="$(find /tmp/fablespace-assets -type f \( -name '*.js' -o -name '*.css' \) -print | sort | sed -n '1p')"
          test -n "${SAMPLE_FILE}"
          SAMPLE_PATH="${SAMPLE_FILE#/tmp/fablespace-assets/}"
          curl --fail --silent --show-error \
            --retry 6 --retry-delay 5 --retry-all-errors \
            --header "Origin: ${PUBLIC_SITE_ORIGIN}" \
            --dump-header /tmp/fablespace-cdn-headers.txt \
            --output /dev/null \
            "${ASSET_BASE_URL}/assets/${SAMPLE_PATH}"
          if ! grep -qi '^access-control-allow-origin:' /tmp/fablespace-cdn-headers.txt; then
            echo "::error::CDN response is missing Access-Control-Allow-Origin"
            exit 1
          fi

      - name: Export frontend image archive
        run: |
          set -euo pipefail
          docker save "${FRONTEND_IMAGE}" | gzip -1 > "fablespace-frontend-${GITHUB_SHA}.tar.gz"

      - uses: actions/upload-artifact@v4
        with:
          name: fablespace-frontend-${{ github.sha }}
          path: fablespace-frontend-${{ github.sha }}.tar.gz
          if-no-files-found: error
          retention-days: 1

  deploy-backend:
    name: Deploy backend
    runs-on: ubuntu-latest
    needs: changes
    if: |
      vars.DEPLOY_ENABLED == 'true' &&
      (github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.infrastructure == 'true')
    steps:
      - name: Validate server configuration
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          for name in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required GitHub Actions secret: ${name}"
              exit 1
            fi
          done

      - name: Update backend service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          command_timeout: 20m
          script: |
            set -eu
            cd "${{ vars.DEPLOY_PATH || '/opt/fablespace' }}"
            git remote set-url origin "https://github.com/${{ github.repository }}.git"
            git fetch --prune origin main
            git reset --hard origin/main

            if sudo docker compose version >/dev/null 2>&1; then
              COMPOSE="sudo docker compose"
            else
              COMPOSE="sudo docker-compose"
            fi

            COMPOSE_FILES="-f docker-compose.yml -f deploy/docker-compose.shared.yml"
            $COMPOSE $COMPOSE_FILES up -d --build backend
            BACKEND_READY=false
            for ATTEMPT in $(seq 1 30); do
              if $COMPOSE $COMPOSE_FILES exec -T backend python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3).read()" >/dev/null 2>&1; then
                BACKEND_READY=true
                break
              fi
              sleep 2
            done
            if [ "${BACKEND_READY}" != "true" ]; then
              $COMPOSE $COMPOSE_FILES logs --tail=120 backend
              echo "backend health check failed"
              exit 1
            fi
            sudo docker image prune -f

  deploy-frontend:
    name: Deploy frontend
    runs-on: ubuntu-latest
    needs:
      - changes
      - build-frontend
      - deploy-backend
    if: |
      always() &&
      vars.DEPLOY_ENABLED == 'true' &&
      (github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.infrastructure == 'true') &&
      needs.build-frontend.result == 'success' &&
      (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: fablespace-frontend-${{ github.sha }}
          path: /tmp/fablespace-deploy

      - name: Upload frontend image archive
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          ARCHIVE_PATH: /tmp/fablespace-deploy/fablespace-frontend-${{ github.sha }}.tar.gz
        run: |
          set -euo pipefail
          for name in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required GitHub Actions secret: ${name}"
              exit 1
            fi
          done
          install -m 700 -d ~/.ssh
          printf '%s\n' "${DEPLOY_SSH_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${DEPLOY_PORT}" "${DEPLOY_HOST}" >> ~/.ssh/known_hosts 2>/dev/null
          scp -P "${DEPLOY_PORT}" -i ~/.ssh/deploy_key \
            "${ARCHIVE_PATH}" \
            "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/fablespace-frontend-${GITHUB_SHA}.tar.gz"

      - name: Replace frontend service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          command_timeout: 20m
          script: |
            set -eu
            cd "${{ vars.DEPLOY_PATH || '/opt/fablespace' }}"
            git remote set-url origin "https://github.com/${{ github.repository }}.git"
            git fetch --prune origin main
            git reset --hard origin/main

            if sudo docker compose version >/dev/null 2>&1; then
              COMPOSE="sudo docker compose"
            else
              COMPOSE="sudo docker-compose"
            fi
            COMPOSE_FILES="-f docker-compose.yml -f deploy/docker-compose.shared.yml"

            IMAGE_ARCHIVE="/tmp/fablespace-frontend-${{ github.sha }}.tar.gz"
            sudo docker load -i "${IMAGE_ARCHIVE}"
            rm -f "${IMAGE_ARCHIVE}"

            if ! $COMPOSE $COMPOSE_FILES ps --services --status running 2>/dev/null | grep -qx backend; then
              $COMPOSE $COMPOSE_FILES up -d --build backend
            fi
            BACKEND_READY=false
            for ATTEMPT in $(seq 1 30); do
              if $COMPOSE $COMPOSE_FILES exec -T backend python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3).read()" >/dev/null 2>&1; then
                BACKEND_READY=true
                break
              fi
              sleep 2
            done
            if [ "${BACKEND_READY}" != "true" ]; then
              $COMPOSE $COMPOSE_FILES logs --tail=120 backend
              echo "backend health check failed"
              exit 1
            fi
            $COMPOSE $COMPOSE_FILES up -d --no-deps --no-build --force-recreate frontend

            FRONTEND_READY=false
            for ATTEMPT in $(seq 1 20); do
              if $COMPOSE $COMPOSE_FILES exec -T frontend wget -qO- http://127.0.0.1/ >/dev/null 2>&1; then
                FRONTEND_READY=true
                break
              fi
              sleep 2
            done
            if [ "${FRONTEND_READY}" != "true" ]; then
              $COMPOSE $COMPOSE_FILES logs --tail=120 frontend
              echo "frontend health check failed"
              exit 1
            fi
            sudo docker image prune -f
